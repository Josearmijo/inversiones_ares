name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download files
        run: |
          mkdir -p app/src/main/assets/www
          wget -q -O app/src/main/assets/www/index.html https://gerencia.inversionesares2.com/condominios_app/www/index.html
          wget -q -O app/src/main/assets/www/manifest.json https://gerencia.inversionesares2.com/condominios_app/www/manifest.json
          wget -q -O app/src/main/assets/www/app.js https://gerencia.inversionesares2.com/condominios_app/www/js/app.js
          wget -q -O app/src/main/assets/www/condominios.css https://gerencia.inversionesares2.com/condominios_app/www/css/condominios.css

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create project
        run: |
          cat > settings.gradle << 'GRADLE'
          pluginManagement { repositories { google() mavenCentral() gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.fallbackToProjectRepositoryRepositories()
          repositories { google() mavenCentral() } }
          rootProject.name = "CondominiosAres"
          include ':app'
          GRADLE

          cat > build.gradle << 'GRADLE'
          buildscript { repositories { google() mavenCentral() } }
          plugins { id 'com.android.application' version '8.1.0' apply false }
          GRADLE

          mkdir -p app
          cat > app/build.gradle << 'GRADLE'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.inversionesares.condominios'
              compileSdk 34
              defaultConfig {
                  applicationId "com.inversionesares.condominios"
                  minSdk 21
                  targetSdk 34
              }
          }
          GRADLE

          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:label="Condominios Ares">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          mkdir -p app/src/main/java/com/inversionesares/condominios
          cat > app/src/main/java/com/inversionesares/condominios/MainActivity.java << 'JAVA'
          package com.inversionesares.condominios;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.getSettings().setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/www/index.html");
                  setContentView(webView);
              }
          }
          JAVA

      - name: Build
        run: ./gradlew assembleDebug -p app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: condominios-ares
          path: app/build/outputs/apk/debug/*.apk
