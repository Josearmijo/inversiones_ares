<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#28a745">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Condominios Ares</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/condominios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1><i class="fas fa-building"></i> Condominios Ares</h1>
            <p id="header-subtitle">Gestión de Pagos</p>
        </div>
        
        <div class="container">
            <!-- Login View -->
            <div id="login-view" class="view">
                <div class="card">
                    <h2 class="text-center"><i class="fas fa-sign-in-alt"></i> Iniciar Sesión</h2>
                    <div id="login-error" class="alert alert-danger hidden"></div>
                    
                    <form id="login-form">
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="login-email" required placeholder="tu@email.com">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Contraseña</label>
                            <input type="password" id="login-password" required placeholder="Tu contraseña">
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                        </button>
                    </form>
                </div>
            </div>

            <!-- Home View (Locatario) -->
            <div id="home-view" class="view hidden">
                <div class="card text-center">
                    <div id="condominio-info" class="mb-3"></div>
                    <div id="inmuebles-list"></div>
                </div>
            </div>

            <!-- Deudas View -->
            <div id="deudas-view" class="view hidden">
                <a href="#" onclick="showHome()" class="back-link">
                    <i class="fas fa-arrow-left"></i> Volver
                </a>
                <div id="deudas-content"></div>
            </div>

            <!-- Pagar View -->
            <div id="pagar-view" class="view hidden">
                <a href="#" onclick="showDeudas()" class="back-link">
                    <i class="fas fa-arrow-left"></i> Volver
                </a>
                <div id="pagar-content"></div>
            </div>

            <!-- Recibos View -->
            <div id="recibos-view" class="view hidden">
                <a href="#" onclick="showHome()" class="back-link">
                    <i class="fas fa-arrow-left"></i> Volver
                </a>
                <div id="recibos-content"></div>
            </div>

            <!-- Admin Condominios View -->
            <div id="admin-view" class="view hidden">
                <a href="#" onclick="logout()" class="back-link">
                    <i class="fas fa-arrow-left"></i> Cerrar Sesión
                </a>
                <div id="admin-content"></div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="nav-bottom" id="main-nav" style="display: none;">
            <a href="#" onclick="showHome()" class="nav-item">
                <i class="fas fa-home"></i> Inicio
            </a>
            <a href="#" onclick="showGastosList()" class="nav-item">
                <i class="fas fa-file-invoice-dollar"></i> Gastos
            </a>
            <a href="#" onclick="logout()" class="nav-item">
                <i class="fas fa-sign-out-alt"></i> Salir
            </a>
        </nav>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
