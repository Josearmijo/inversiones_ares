name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download files
        run: |
          mkdir -p app/src/main/assets/www
          wget -q -O app/src/main/assets/www/index.html https://gerencia.inversionesares2.com/condominios_app/www/index.html
          wget -q -O app/src/main/assets/www/manifest.json https://gerencia.inversionesares2.com/condominios_app/www/manifest.json
          wget -q -O app/src/main/assets/www/app.js https://gerencia.inversionesares2.com/condominios_app/www/js/app.js
          wget -q -O app/src/main/assets/www/condominios.css https://gerencia.inversionesares2.com/condominios_app/www/css/condominios.css

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'

      - name: Create project
        run: |
          mkdir -p app/src/main/assets/www
          cp -r www/* app/src/main/assets/ 2>/dev/null || true
          
          cat > settings.gradle << 'EOF'
          rootProject.name = "CondominiosAres"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript { repositories { google() mavenCentral() } }
          plugins { id 'com.android.application' version '8.1.0' apply false }
          EOF

          mkdir -p app
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.inversionesares.condominios'
              compileSdk 34
              defaultConfig {
                  applicationId "com.inversionesares.condominios"
                  minSdk 21
                  targetSdk 34
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="Condominios Ares">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          mkdir -p app/src/main/java/com/inversionesares/condominios
          cat > app/src/main/java/com/inversionesares/condominios/MainActivity.java << 'EOF'
          package com.inversionesares.condominios;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView w = new WebView(this);
                  w.getSettings().setJavaScriptEnabled(true);
                  w.getSettings().setDomStorageEnabled(true);
                  w.setWebViewClient(new WebViewClient());
                  w.loadUrl("file:///android_asset/www/index.html");
                  setContentView(w);
              }
          }
          EOF

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          export PATH=$PATH:$PWD/gradle-8.2/bin

      - name: Build APK
        run: |
          export PATH=$PATH:$PWD/gradle-8.2/bin
          gradle-8.2/bin/gradle assembleDebug -p app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: condominios-ares
          path: app/build/outputs/apk/debug/*.apk
